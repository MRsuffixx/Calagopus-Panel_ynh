#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/tests.v1.schema.json

test_format = 1.0

[default]

    # -----------------------------------------------------------------------
    # Excluded tests:
    # - install.multi: excluded because multi_instance = false in manifest.toml
    # -----------------------------------------------------------------------
    exclude = ["install.multi"]

    # -----------------------------------------------------------------------
    # The CI will automatically test install.root (path = "/") since that is
    # the default path in the manifest. install.subdir is tested automatically too.
    #
    # We explicitly set the path arg for subdir tests since the manifest
    # default is "/" (root), not a subdirectory.
    # -----------------------------------------------------------------------

    # Default install args — the CI fills domain, path, and standard args automatically.
    # Nothing custom needed here.

    # -----------------------------------------------------------------------
    # Upgrade testing: once a stable release commit exists, add it here.
    # Example (uncomment and replace with a real commit SHA from main):
    # -----------------------------------------------------------------------
    # test_upgrade_from.00a1a6e7.name = "Upgrade from initial release"

    # -----------------------------------------------------------------------
    # Subdir install test — override path to test non-root installation
    # -----------------------------------------------------------------------

[subdir]
    only = ["install.subdir"]
    args.path = "/panel"
