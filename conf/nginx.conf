#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

    # ---------------------------------------------------------------------------
    # Reverse proxy to the Calagopus Panel Rust HTTP server
    # The panel only listens on localhost; NGINX is the sole internet-facing gate
    # ---------------------------------------------------------------------------
    proxy_pass http://127.0.0.1:__PORT__/;

    # HTTP/1.1 is required for WebSocket (real-time server console) support
    proxy_http_version 1.1;

    # WebSocket upgrade headers — essential for the live console feature
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers so the Rust backend sees the real client info
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow APP_TRUSTED_PROXIES in .env to recognize 127.0.0.1 as trusted
    proxy_set_header X-Forwarded-Host $host;

    # Extended timeout for long-lived WebSocket connections (game console streams)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    # Increase buffer sizes for large server output payloads
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # Do not pass the YunoHost SSO cookie upstream — Calagopus has its own auth
    proxy_hide_header X-SSO-Redirect;

    # Allow large file uploads (e.g. game server mods, configs)
    client_max_body_size 256M;

    # Disable redirect rewriting — let Calagopus handle its own redirects
    proxy_redirect off;

    # Standard YunoHost include for additional headers (HSTS, CSP, etc.)
    more_set_headers "Strict-Transport-Security: max-age=15768000";
}
