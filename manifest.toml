#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "calagopus-panel"
name = "Calagopus Panel"
description.en = "Open-source game server management panel built with Rust and React"
description.fr = "Panneau de gestion de serveurs de jeux open-source construit avec Rust et React"

version = "0.1~ynh1"

maintainers = []

[upstream]
license = "MIT"
website = "https://calagopus.com"
admindoc = "https://calagopus.com/docs"
userdoc = "https://calagopus.com/docs"
code = "https://github.com/calagopus/panel"

[integration]
yunohost = ">= 11.2"
helpers_version = "2.1"
# Only compiled binaries are available for these two architectures
architectures = ["amd64", "arm64"]
multi_instance = false

# Calagopus Panel has its own user/role system — no LDAP integration
ldap = false

# Calagopus Panel has its own login screen — YunoHost portal SSO must be disabled
sso = false

# The Rust binary is small (~20 MB); PostgreSQL and Valkey add disk usage
disk = "1G"
# The panel itself is lightweight; PostgreSQL needs headroom
ram.build = "512M"
ram.runtime = "512M"

[install]
    [install.domain]
    # Generic question — YunoHost core handles the wording
    type = "domain"

    [install.path]
    # Generic question — suggest root path since Calagopus expects to own the whole domain
    type = "path"
    default = "/"

[resources]

    # ------------------------------------------------------------
    # System user — runs the panel process with minimal privileges
    # ------------------------------------------------------------
    [resources.system_user]

    # ------------------------------------------------------------
    # Install directory — used as a working/data directory placeholder
    # ------------------------------------------------------------
    [resources.install_dir]
    dir = "/var/www/$app"

    # ------------------------------------------------------------
    # Port — YunoHost picks a free port near 8000
    # Stored as $port; used in .env (BIND) and nginx.conf
    # ------------------------------------------------------------
    [resources.ports]
    main.default = 8000

    # ------------------------------------------------------------
    # APT packages
    # redis-server — standard cache server; YunoHost starts it automatically
    # ------------------------------------------------------------
    [resources.apt]
    packages = "redis-server"

    # ------------------------------------------------------------
    # PostgreSQL database — natively managed by YunoHost
    # Passes $db_user, $db_name, $db_pwd to the install script
    # ------------------------------------------------------------
    [resources.database]
    type = "postgresql"

    # ------------------------------------------------------------
    # Sources — downloaded automatically into $install_dir
    # ------------------------------------------------------------
    [resources.sources.main]
    # TODO: Replace the URLs with actual stable version URLs and add correct SHA256 sums
    amd64.url = "https://github.com/calagopus/panel/releases/download/v0.1.0/panel-rs-x86_64-linux"
    amd64.sha256 = "INSERT_AMD64_SHA256_HERE"

    arm64.url = "https://github.com/calagopus/panel/releases/download/v0.1.0/panel-rs-aarch64-linux"
    arm64.sha256 = "INSERT_ARM64_SHA256_HERE"

    extract = false
    rename = "calagopus-panel"

    # ------------------------------------------------------------
    # Permissions
    # allowed = "visitors" so the tile appears in the portal and
    # anyone can reach the panel's own login screen (no SSO gate).
    # auth_header = false disables the YunoHost SSO header injection.
    # ------------------------------------------------------------
    [resources.permissions]
    main.url = "/"
    main.allowed = "visitors"
    main.auth_header = false
    main.show_tile = true
    main.protected = false
